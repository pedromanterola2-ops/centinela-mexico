<!--
  SNIPPET: Botón "Centinela México" para insertar en centinelatactico.com
  Ubicación sugerida: ficha /pais/mexico, debajo del encabezado o en columna lateral
  Paleta: verde militar (#4ade80) sobre fondo oscuro, coherente con la estética de CM
-->

<!-- Opción A: Tarjeta compacta (para sidebar o sección de "Ver más") -->
<a
  href="https://centinelamx.vercel.app"
  target="_blank"
  rel="noopener noreferrer"
  style="
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 8px;
    background: rgba(74, 222, 128, 0.07);
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
  "
  onmouseover="this.style.borderColor='rgba(74,222,128,0.55)'; this.style.background='rgba(74,222,128,0.12)';"
  onmouseout="this.style.borderColor='rgba(74,222,128,0.3)'; this.style.background='rgba(74,222,128,0.07)';"
>
  <!-- Logotipo CM -->
  <div style="
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(74, 222, 128, 0.35);
    border-radius: 5px;
    background: rgba(74, 222, 128, 0.12);
    flex-shrink: 0;
  ">
    <span style="font-size: 10px; font-weight: 700; color: #4ade80; letter-spacing: 0.05em; font-family: monospace;">CM</span>
  </div>

  <!-- Textos -->
  <div>
    <p style="margin: 0 0 2px; font-size: 13px; font-weight: 600; color: #4ade80; letter-spacing: 0.02em; line-height: 1;">
      Centinela México
    </p>
    <p style="margin: 0; font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.3;">
      Datos detallados por fuerza y estado →
    </p>
  </div>
</a>
